name: bias_mitra
description: "BiasMitra - Unbiased AI for Bharat. An AI fairness auditing platform to detect and mitigate bias in government schemes."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Google Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.4.4

  # State Management
  provider: ^6.1.2

  # Google AI
  google_generative_ai: ^0.4.0

  # UI & Theming
  google_fonts: ^6.2.1
  fl_chart: ^0.70.0

  # File & Data Handling
  file_picker: ^8.1.2
  csv: ^6.0.0
  pdf: ^3.11.0
  printing: ^5.13.0

  # Accessibility
  flutter_tts: ^4.2.0
  fluttertoast: ^8.2.8

  # Additional useful packages
  intl: ^0.19.0
  connectivity_plus: ^5.0.0
  cupertino_icons: ^1.0.2
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # Assets will be added here if needed
  assets:
    - .env

  # Fonts - Google Fonts handles these automatically
